name: Astikan visual cross-browser audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/astikan-visual-audit.yml'
      - 'qa/visual-audit.mjs'
      - 'qa/visual-validation.mjs'
  workflow_dispatch:

permissions:
  contents: read

env:
  AUDIT_BASE_URL: https://www.astikan.com

jobs:
  visual-validation:
    name: Standard-motion browser validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout QA branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install validation dependencies
        run: npm install --no-save --package-lock=false playwright@1.57.0

      - name: Install browser engines and system libraries
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate standard-motion settled states
        run: node qa/visual-validation.mjs

      - name: Upload validation screenshots and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astikan-standard-motion-validation
          path: visual-validation-output
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
