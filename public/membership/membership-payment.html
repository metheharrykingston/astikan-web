<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Membership Payment | Astikan Health</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="assets/membership-dashboard.css" rel="stylesheet"/>
<style>
  .member-payment-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 120px);
    padding: 1rem 0 2rem;
  }
  .member-payment-card {
    width: 100%;
    max-width: 520px;
    border: 0;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(79, 70, 229, 0.12);
    background: #fff;
  }
  .member-payment-card .amount {
    font-size: 2rem;
    font-weight: 800;
    color: #4f46e5;
  }
  .member-payment-card .pay-btn {
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
    border: 0;
    color: #fff;
    font-weight: 700;
    padding: 14px 18px;
    border-radius: 12px;
    width: 100%;
  }
</style>
</head>
<body class="dash-body" data-member-page="payment">

<main class="dash-main member-payment-wrap">
  <div class="member-payment-card p-4 p-md-5">
    <div class="d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-shield-lock-fill text-primary fs-4"></i>
      <h1 class="h4 mb-0">Secure Membership Payment</h1>
    </div>
    <p class="text-muted mb-4">Complete payment to activate your membership. Your enrollment is already saved — payment activates your plan benefits.</p>
    <div class="border rounded-4 p-3 mb-4 bg-light">
      <div class="d-flex justify-content-between mb-2">
        <span class="text-muted">Plan</span>
        <strong id="planName">Membership Plan</strong>
      </div>
      <div class="d-flex justify-content-between align-items-end">
        <span class="text-muted">Amount</span>
        <div class="amount" id="planAmount">₹0</div>
      </div>
    </div>
    <button class="pay-btn" id="payNowButton" type="button">Pay with Cashfree</button>
    <p class="small text-muted mt-3 mb-2" id="paymentStatus">Loading payment details...</p>
    <a class="small text-decoration-none" href="#" id="goToDashboardLink">View dashboard without payment (payment not done)</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/astikan-config.js"></script>
<script src="assets/member-portal-routes.js"></script>
<script src="assets/member-portal-nav.js"></script>
<script src="assets/membership-payment-legacy.js?v=20260701"></script>
</body>
</html>
